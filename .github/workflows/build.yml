"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.set_version.outputs.build_version }}

    steps:
      - name: Compute version
        id: set_version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "build_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Computed Version: $VERSION"

  build:
    needs: version
    strategy:
      matrix:
        # Arbitrary atributes, matrix will go through all permutations!
        os: [ubuntu-24.04, windows-2025]
        dotnet: ["8.0.x", "9.0.x"]
      fail-fast: false

    uses: ./.github/workflows/reusable-build.yml
    with:
      dotnet-version: ${{ matrix.dotnet }}
      runs-on: ${{matrix.os}}
      build-version: ${{ needs.version.outputs.build_version }}

  deploy:
    runs-on: ubuntu-latest
    needs: [version, build]
    environment: production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifact

      - name: Simulate deploy
        run: |
          echo "Deploying Version ${{ needs.version.outputs.build_version }} with files:"
          ls ./artifact
          echo "Deploy complete."
